[supervisord]
nodaemon=true
user=root

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
user=nginx

[program:gunicorn]
command=gunicorn --access-logfile - --workers 3 --bind unix:/usr/src/gmod-logs-server/gmodlogs.sock core.wsgi:application
directory=/usr/src/gmod-logs-server/gmodlogs
autostart=true
environment=HOME="/tmp"
autorestart=true
user=nginx
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
