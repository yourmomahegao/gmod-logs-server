[supervisord]
nodaemon=true
user=root

[program:gunicorn]
command=gunicorn --access-logfile - --workers 3 --bind 0.0.0.0:49263 core.wsgi:application
directory=/usr/src/gmod-logs-server/gmodlogs
autostart=true
environment=HOME="/tmp"
autorestart=true
user=root
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
